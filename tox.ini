[tox]
envlist =
;    py39
;    py310
;    py311
;    py312
    py313
    py314
    py315

requires =
    tox-uv>=1.28

[testenv]
;extras =
;    fast
deps =
    # parameterized
    pytest>=7.4.4
    pytest-cov>=4.1.0
    toml;python_version<'3.11'
    pytest-benchmark>=4.0.0
    hypothesis>=6.96.0
    ; pytest_mock
    pytest-xdist>=3.5.0
    pytest_asyncio
commands =
    pytest test -q -n 5  --dist=loadfile --cov=paipi --cov-fail-under=35 -p no:benchmark
setenv =
    PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
